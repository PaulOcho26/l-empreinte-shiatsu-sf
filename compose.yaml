services:
  php:
    image: dunglas/frankenphp:1-php8.4
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - SERVER_NAME=:8000
      - APP_RUNTIME=Symfony\Component\Runtime\SymfonyRuntime
      - DATABASE_URL=postgresql://sandrine:182618@database:5432/l_empreinte
    depends_on:
      - database

  database:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: l_empreinte
      POSTGRES_USER: sandrine
      POSTGRES_PASSWORD: 182618
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:

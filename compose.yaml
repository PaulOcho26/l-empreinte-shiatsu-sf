services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/app
    environment:
      - SERVER_NAME=:80
      - APP_RUNTIME=Symfony\Component\Runtime\SymfonyRuntime
      - DATABASE_URL=postgresql://sandrine:182618@database:5432/l_empreinte?serverVersion=14&charset=utf8
    depends_on:
      - database

  database:
    image: postgres:14-alpine
    restart: always
    environment:
      - POSTGRES_DB=l_empreinte
      - POSTGRES_USER=sandrine
      - POSTGRES_PASSWORD=182618
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - database

volumes:
  db_data: